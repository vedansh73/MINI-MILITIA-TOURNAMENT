<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Militia Tournament Jackpot</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:url('https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=1600&q=80');
    background-size:cover;
    background-position:center;
    min-height:100vh;
    color:white;
}

.overlay{
    background:rgba(0,0,0,0.75);
    min-height:100vh;
}

.page{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    text-align:center;
    padding:20px;
}

.banner{
    width:320px;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 0 20px gold;
}

input{
    padding:12px;
    width:220px;
    border:none;
    border-radius:10px;
    margin-top:10px;
    font-size:18px;
}

button{
    margin-top:15px;
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:gold;
    font-weight:bold;
}

h1{
    color:gold;
    text-shadow:0 0 15px gold;
}

#gamePage{
    display:none;
}

.slot{
    width:320px;
    height:90px;
    overflow:hidden;
    border:4px solid gold;
    border-radius:15px;
    background:#111;
    margin-top:20px;
    position:relative;
}

#items{
    position:absolute;
    width:100%;
}

.reward{
    height:90px;
    line-height:90px;
    font-size:28px;
    font-weight:bold;
}

#result{
    margin-top:20px;
    font-size:28px;
}

#collectBtn{
    display:none;
}

.jackpot-img{
    width:250px;
    border-radius:15px;
    margin-bottom:15px;
    box-shadow:0 0 25px gold;
}
</style>
</head>
<body>

<div class="overlay">

<!-- LOGIN PAGE -->
<div class="page" id="loginPage">

<img class="banner"
src="https://images.unsplash.com/photo-1511512578047-dfb367046420?auto=format&fit=crop&w=800&q=80">

<h1>MINI MILITIA TOURNAMENT</h1>

<h3>Enter Password</h3>

<input type="password" id="pass" placeholder="Password">

<button onclick="checkPass()">ENTER</button>

</div>

<!-- JACKPOT PAGE -->
<div class="page" id="gamePage">

<img class="jackpot-img"
src="https://images.unsplash.com/photo-1593305841991-05c297ba4575?auto=format&fit=crop&w=800&q=80">

<h1>🎰 JACKPOT 🎰</h1>

<div class="slot">
<div id="items">

<div class="reward">🌐 WEB</div>
<div class="reward">📱 MINI MILITIA</div>
<div class="reward">👥 10 SUBSCRIBERS</div>
<div class="reward">🎥 AI VIDEO</div>

</div>
</div>

<button onclick="spin()">SPIN NOW</button>

<h2 id="result"></h2>

<button id="collectBtn"
onclick="window.open('https://discord.com/invite/nehCrRZsQ','_blank')">
COLLECT REWARD
</button>

</div>

</div>

<script>

function checkPass(){

let p=document.getElementById("pass").value;

if(p==="0502"){
document.getElementById("loginPage").style.display="none";
document.getElementById("gamePage").style.display="flex";
}
else{
alert("Wrong Password");
}

}

const rewards=[
"🌐 WEB",
"📱 MINI MILITIA",
"👥 10 SUBSCRIBERS",
"🎥 AI VIDEO"
];

function spin(){

let items=document.getElementById("items");
let result=document.getElementById("result");
let btn=document.getElementById("collectBtn");

btn.style.display="none";
result.innerHTML="";

let pos=0;

let interval=setInterval(()=>{

pos-=90;

if(pos<-270){
pos=0;
}

items.style.top=pos+"px";

},70);

setTimeout(()=>{

clearInterval(interval);

let reward=rewards[Math.floor(Math.random()*rewards.length)];

result.innerHTML="🎉 YOU WON 🎉<br><br>"+reward;

btn.style.display="inline-block";

},3500);

}

</script>

</body>
</html>
